command:
  - uvicorn
  - backend.main:app
  - --host=0.0.0.0
  - --port=8000
env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: ""
  - name: LAKEBASE_HOST
    value: ""
  - name: LAKEBASE_DATABASE
    value: "fraud_demo"
  - name: MODEL_SERVING_ENDPOINT
    value: "bank-fraud-predict"
  - name: UNITY_CATALOG
    value: ""
  - name: UNITY_SCHEMA
    value: ""
resources:
  - name: lakebase-db
    lakebase:
      database: fraud_demo
      permission: READ_WRITE
  - name: fraud-model
    serving_endpoint:
      name: bank-fraud-predict
      permission: CAN_QUERY
