command:
  - uvicorn
  - backend.main:app
  - --host=0.0.0.0
  - --port=8000
env:
  - name: MODEL_SERVING_ENDPOINT
    value: "bank-fraud-predict"
resources:
  - name: lakebase-db
    lakebase:
      database: databricks_postgres
      permission: READ_WRITE
  - name: fraud-model
    serving_endpoint:
      name: bank-fraud-predict
      permission: CAN_QUERY
